<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ateliê — Clientes</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.clientes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem;}
.card-cliente{background:var(--branco);border:1px solid var(--borda);border-radius:8px;padding:1.25rem;transition:box-shadow 0.2s,transform 0.2s;}
.card-cliente:hover{box-shadow:0 4px 16px rgba(44,24,16,0.1);transform:translateY(-1px);}
.cli-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.cli-nome{font-family:var(--serif);font-size:1.15rem;font-weight:400;}
.cli-contato{font-size:12px;color:var(--texto-muted);margin-bottom:8px;}
.cli-tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px;}
.tag-feminino{background:var(--rosa-claro);color:var(--rosa);}
.tag-masculino{background:var(--azul-claro);color:var(--azul);}
.tag-infantil{background:var(--verde-claro);color:var(--verde);}
.cli-elastico{background:var(--azul-claro);color:var(--azul);border-radius:4px;padding:4px 8px;font-size:11px;font-weight:500;margin-top:4px;display:inline-block;}
.cli-elastico-est{background:var(--amarelo-claro);color:var(--amarelo);border-radius:4px;padding:4px 8px;font-size:11px;font-weight:500;margin-top:4px;display:inline-block;}
.medidas-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:8px;}
.med-item{background:var(--creme);border-radius:3px;padding:4px 8px;font-size:11px;}
.med-label{color:var(--texto-muted);display:block;font-size:10px;}
.med-val{font-weight:500;}
.cli-acoes{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--borda);}
.filtro-btn.ativo-f{border-color:var(--rosa);background:var(--rosa-claro);color:var(--rosa);}
.filtro-btn.ativo-m{border-color:var(--azul);background:var(--azul-claro);color:var(--azul);}
.filtro-btn.ativo-i{border-color:var(--verde);background:var(--verde-claro);color:var(--verde);}
.perfil-sel{display:flex;gap:8px;margin-bottom:1rem;}
.perfil-btn{flex:1;padding:10px 8px;border:2px solid var(--borda);border-radius:8px;cursor:pointer;text-align:center;background:var(--branco);transition:all 0.15s;font-family:var(--sans);}
.perfil-btn .pb-icon{font-size:1.4rem;display:block;margin-bottom:3px;}
.perfil-btn .pb-label{font-size:11px;font-weight:500;display:block;color:var(--texto-muted);}
.perfil-btn.sel-f{border-color:var(--rosa);background:var(--rosa-claro);}
.perfil-btn.sel-f .pb-label{color:var(--rosa);}
.perfil-btn.sel-m{border-color:var(--azul);background:var(--azul-claro);}
.perfil-btn.sel-m .pb-label{color:var(--azul);}
.perfil-btn.sel-i{border-color:var(--verde);background:var(--verde-claro);}
.perfil-btn.sel-i .pb-label{color:var(--verde);}
.elastico-preview{border-radius:6px;padding:10px 14px;font-size:12px;margin-top:0.5rem;line-height:1.6;display:none;}
.elastico-real{background:var(--azul-claro);color:var(--azul);border:1px solid #B0CCEA;}
.elastico-est{background:var(--amarelo-claro);color:#7A5010;border:1px solid #E0C070;}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">✂️ Ateliê</a>
    <a href="clientes.html" class="nav-link ativo">👗 <span>Clientes</span></a>
    <a href="biblioteca.html" class="nav-link">🧵 <span>Materiais</span></a>
    <a href="estrutura.html" class="nav-link">✂️ <span>Modelos</span></a>
    <a href="pedidos.html" class="nav-link">📦 <span>Pedidos</span></a>
  </div>
</nav>

<!-- BANNER OFFLINE -->
<div id="banner-offline" style="display:none;background:#C4973A;color:white;padding:8px 1rem;font-size:12px;font-weight:500;align-items:center;justify-content:center;gap:8px;position:sticky;top:52px;z-index:99;">
  📶 <span id="banner-count">Você está offline</span>
</div>

<div class="container">
  <div class="sec-header">
    <h2>Minhas <em>Clientes</em></h2>
    <button class="btn btn-primary" onclick="abrirModal(null)">+ Nova cliente</button>
  </div>

  <div class="filtros-wrap">
    <button class="filtro-btn ativo" onclick="setFiltro('todos',this)">Todos</button>
    <button class="filtro-btn" onclick="setFiltro('feminino',this)">🌸 Feminino</button>
    <button class="filtro-btn" onclick="setFiltro('masculino',this)">👔 Masculino</button>
    <button class="filtro-btn" onclick="setFiltro('infantil',this)">⭐ Infantil</button>
    <div class="busca-wrap" style="margin-left:auto">
      <input type="text" id="busca" placeholder="🔍 Buscar pelo nome..." oninput="renderClientes()"/>
    </div>
  </div>

  <div class="clientes-grid" id="clientes-grid">
    <div class="empty" style="grid-column:1/-1"><div class="empty-icon">👗</div><p>Carregando...</p></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <h3 id="modal-titulo">Nova Cliente</h3>

    <div class="form-group">
      <label class="lbl">Perfil</label>
      <div class="perfil-sel">
        <button type="button" class="perfil-btn" onclick="selPerfil('feminino',this)" id="pb-feminino">
          <span class="pb-icon">🌸</span><span class="pb-label">Feminino</span>
        </button>
        <button type="button" class="perfil-btn" onclick="selPerfil('masculino',this)" id="pb-masculino">
          <span class="pb-icon">👔</span><span class="pb-label">Masculino</span>
        </button>
        <button type="button" class="perfil-btn" onclick="selPerfil('infantil',this)" id="pb-infantil">
          <span class="pb-icon">⭐</span><span class="pb-label">Infantil</span>
        </button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="lbl">Nome</label>
        <input type="text" id="cli-nome" placeholder="Nome completo"/>
      </div>
      <div class="form-group">
        <label class="lbl">Contato <span class="opcional">(opcional)</span></label>
        <input type="text" id="cli-contato" placeholder="WhatsApp, telefone..."/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="lbl">Tamanho usual</label>
        <select id="cli-tamanho" onchange="calcElastico()">
          <option value="">—</option>
          <option>2</option><option>4</option><option>6</option><option>8</option><option>10</option><option>12</option>
          <option>34</option><option>36</option><option>38</option><option>40</option>
          <option>42</option><option>44</option><option>46</option><option>48</option><option>50</option>
          <option>PP</option><option>P</option><option>M</option><option>G</option><option>GG</option><option>XG</option>
        </select>
      </div>
      <div class="form-group">
        <label class="lbl">Data da medição <span class="opcional">(opcional)</span></label>
        <input type="date" id="cli-data"/>
      </div>
    </div>

    <div id="grupo-infantil-extra" style="display:none">
      <div class="form-row">
        <div class="form-group">
          <label class="lbl">Idade</label>
          <input type="text" id="cli-idade" placeholder="Ex: 5 anos"/>
        </div>
        <div class="form-group">
          <label class="lbl">Altura da criança (cm)</label>
          <input type="number" id="cli-altura-crianca" step="0.5" placeholder="—"/>
        </div>
      </div>
    </div>

    <div class="grupo">
      <div class="grupo-header" onclick="toggleGrupo('geral')">
        <span class="grupo-titulo">📐 Corpo geral</span>
        <span class="grupo-seta aberto" id="seta-geral">▼</span>
      </div>
      <div class="grupo-body aberto" id="body-geral">
        <div class="form-row-3">
          <div class="form-group">
            <label class="lbl" id="lbl-busto">Busto (cm)</label>
            <input type="number" id="cli-busto" step="0.5" placeholder="—"/>
          </div>
          <div class="form-group">
            <label class="lbl">Cintura (cm)</label>
            <input type="number" id="cli-cintura" step="0.5" placeholder="—" oninput="calcElastico()"/>
          </div>
          <div class="form-group">
            <label class="lbl">Quadril (cm)</label>
            <input type="number" id="cli-quadril" step="0.5" placeholder="—"/>
          </div>
          <div class="form-group">
            <label class="lbl">Altura total (cm)</label>
            <input type="number" id="cli-altura" step="0.5" placeholder="—"/>
          </div>
          <div class="form-group">
            <label class="lbl">Peso (kg) <span class="opcional">opc.</span></label>
            <input type="number" id="cli-peso" step="0.5" placeholder="—"/>
          </div>
        </div>
        <div id="elastico-preview" class="elastico-preview"></div>
      </div>
    </div>

    <div class="grupo">
      <div class="grupo-header" onclick="toggleGrupo('cima')">
        <span class="grupo-titulo">👕 Parte de cima</span>
        <span class="grupo-seta" id="seta-cima">▼</span>
      </div>
      <div class="grupo-body" id="body-cima">
        <div class="form-row-3">
          <div class="form-group"><label class="lbl">Ombro (cm)</label><input type="number" id="cli-ombro" step="0.5" placeholder="—"/></div>
          <div class="form-group"><label class="lbl">Largura costas (cm)</label><input type="number" id="cli-costas" step="0.5" placeholder="—"/></div>
          <div class="form-group"><label class="lbl">Manga (cm)</label><input type="number" id="cli-manga" step="0.5" placeholder="—"/></div>
          <div class="form-group"><label class="lbl">Punho (cm)</label><input type="number" id="cli-punho" step="0.5" placeholder="—"/></div>
          <div class="form-group" id="campo-decote"><label class="lbl">Prof. decote (cm)</label><input type="number" id="cli-decote" step="0.5" placeholder="—"/></div>
          <div class="form-group"><label class="lbl">Comp. torso (cm)</label><input type="number" id="cli-torso" step="0.5" placeholder="—"/></div>
        </div>
      </div>
    </div>

    <div class="grupo">
      <div class="grupo-header" onclick="toggleGrupo('baixo')">
        <span class="grupo-titulo">👖 Parte de baixo</span>
        <span class="grupo-seta" id="seta-baixo">▼</span>
      </div>
      <div class="grupo-body" id="body-baixo">
        <div class="form-row-3">
          <div class="form-group"><label class="lbl">Comprimento (cm)</label><input type="number" id="cli-comprimento" step="0.5" placeholder="—"/></div>
          <div class="form-group" id="campo-entrepernas"><label class="lbl">Entrepernas (cm)</label><input type="number" id="cli-entrepernas" step="0.5" placeholder="—"/></div>
          <div class="form-group"><label class="lbl">Coxa (cm)</label><input type="number" id="cli-coxa" step="0.5" placeholder="—"/></div>
          <div class="form-group"><label class="lbl">Joelho (cm)</label><input type="number" id="cli-joelho" step="0.5" placeholder="—"/></div>
          <div class="form-group"><label class="lbl">Barra (cm)</label><input type="number" id="cli-barra" step="0.5" placeholder="—"/></div>
        </div>
      </div>
    </div>

    <div class="grupo">
      <div class="grupo-header" onclick="toggleGrupo('acab')">
        <span class="grupo-titulo">🧣 Acabamentos</span>
        <span class="grupo-seta" id="seta-acab">▼</span>
      </div>
      <div class="grupo-body" id="body-acab">
        <div class="form-row-3">
          <div class="form-group"><label class="lbl">Circunf. cabeça (cm)</label><input type="number" id="cli-cabeca" step="0.5" placeholder="—"/></div>
          <div class="form-group"><label class="lbl">Comp. capuz (cm)</label><input type="number" id="cli-capuz" step="0.5" placeholder="—"/></div>
          <div class="form-group"><label class="lbl">Pescoço (cm)</label><input type="number" id="cli-pescoco" step="0.5" placeholder="—"/></div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="lbl">Observações <span class="opcional">(opcional)</span></label>
      <textarea id="cli-obs" rows="2" placeholder="Preferências, detalhes especiais..."></textarea>
    </div>

    <div class="modal-acoes">
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar" onclick="salvarCliente()">Salvar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
const TAMANHOS_PADRAO = {
  '2':42,'4':46,'6':50,'8':54,'10':58,'12':62,
  '34':62,'36':66,'38':70,'40':74,'42':78,'44':82,'46':86,'48':90,'50':94,
  'PP':60,'P':66,'M':72,'G':78,'GG':84,'XG':90
};
const ELASTICO_REDUCAO = 12;

let clientes = [];
let editId = null;
let perfilAtual = 'feminino';
let filtroAtual = 'todos';

const CAMPOS_NUM = ['cli-busto','cli-cintura','cli-quadril','cli-altura','cli-peso',
  'cli-ombro','cli-costas','cli-manga','cli-punho','cli-decote','cli-torso',
  'cli-comprimento','cli-entrepernas','cli-coxa','cli-joelho','cli-barra',
  'cli-cabeca','cli-capuz','cli-pescoco','cli-altura-crianca'];

const MAPA_MEDIDAS = {
  busto:'cli-busto',cintura:'cli-cintura',quadril:'cli-quadril',altura:'cli-altura',peso:'cli-peso',
  ombro:'cli-ombro',costas:'cli-costas',manga:'cli-manga',punho:'cli-punho',decote:'cli-decote',torso:'cli-torso',
  comprimento:'cli-comprimento',entrepernas:'cli-entrepernas',coxa:'cli-coxa',joelho:'cli-joelho',barra:'cli-barra',
  cabeca:'cli-cabeca',capuz:'cli-capuz',pescoco:'cli-pescoco',altura_crianca:'cli-altura-crianca'
};

const MED_LABEL = {
  busto:'Busto',cintura:'Cintura',quadril:'Quadril',altura:'Altura',peso:'Peso',
  ombro:'Ombro',costas:'Costas',manga:'Manga',punho:'Punho',decote:'Decote',torso:'Torso',
  comprimento:'Compr.',entrepernas:'Entreperr.',coxa:'Coxa',joelho:'Joelho',barra:'Barra',
  cabeca:'Cabeça',capuz:'Capuz',pescoco:'Pescoço',altura_crianca:'Alt. criança'
};

function fecharModal() { document.getElementById('modal-cliente').classList.remove('aberto'); }

function selPerfil(perfil, btn) {
  perfilAtual = perfil;
  ['feminino','masculino','infantil'].forEach(function(p) {
    document.getElementById('pb-' + p).className = 'perfil-btn';
  });
  btn.classList.add('sel-' + perfil[0]);
  document.getElementById('grupo-infantil-extra').style.display = perfil === 'infantil' ? '' : 'none';
  document.getElementById('lbl-busto').textContent = perfil === 'masculino' ? 'Tórax (cm)' : 'Busto (cm)';
  document.getElementById('campo-decote').style.display = perfil === 'feminino' ? '' : 'none';
  document.getElementById('campo-entrepernas').style.display = perfil === 'feminino' ? 'none' : '';
  calcElastico();
}

function toggleGrupo(id) {
  var body = document.getElementById('body-' + id);
  var seta = document.getElementById('seta-' + id);
  body.classList.toggle('aberto', !body.classList.contains('aberto'));
  seta.classList.toggle('aberto', !seta.classList.contains('aberto'));
}

function calcElasticoValor(cintura, tamanho) {
  var red = ELASTICO_REDUCAO;
  if (cintura > 0) {
    var el = (cintura * (1 - red/100)).toFixed(1);
    return {val: el, tipo: 'real', txt: '📐 Elástico: cintura <strong>' + cintura + 'cm</strong> − ' + red + '% = <strong>' + el + 'cm</strong>'};
  }
  if (tamanho && TAMANHOS_PADRAO[tamanho]) {
    var cinPad = TAMANHOS_PADRAO[tamanho];
    var el2 = (cinPad * (1 - red/100)).toFixed(1);
    return {val: el2, tipo: 'estimativa', txt: '📐 Estimativa pelo tamanho <strong>' + tamanho + '</strong>: cintura padrão ' + cinPad + 'cm − ' + red + '% = <strong>' + el2 + 'cm</strong>'};
  }
  return null;
}

function calcElastico() {
  var cintura = parseFloat(document.getElementById('cli-cintura').value) || 0;
  var tamanho = document.getElementById('cli-tamanho').value;
  var box = document.getElementById('elastico-preview');
  var result = calcElasticoValor(cintura, tamanho);
  if (result) {
    box.innerHTML = result.txt;
    box.className = 'elastico-preview ' + (result.tipo === 'real' ? 'elastico-real' : 'elastico-est');
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }
}

function setFiltro(val, btn) {
  filtroAtual = val;
  document.querySelectorAll('.filtro-btn').forEach(function(b) { b.classList.remove('ativo','ativo-f','ativo-m','ativo-i'); });
  if (val === 'todos') btn.classList.add('ativo');
  else if (val === 'feminino') btn.classList.add('ativo-f');
  else if (val === 'masculino') btn.classList.add('ativo-m');
  else if (val === 'infantil') btn.classList.add('ativo-i');
  renderClientes();
}

function abrirModal(id) {
  editId = id;
  document.getElementById('modal-titulo').textContent = id ? 'Editar Cliente' : 'Nova Cliente';
  document.getElementById('elastico-preview').style.display = 'none';
  ['cli-nome','cli-contato','cli-obs','cli-idade'].forEach(function(f) { document.getElementById(f).value = ''; });
  CAMPOS_NUM.forEach(function(f) { var el = document.getElementById(f); if(el) el.value = ''; });
  document.getElementById('cli-tamanho').value = '';
  document.getElementById('cli-data').value = '';
  var perfil = 'feminino';
  if (id) {
    var c = clientes.find(function(x) { return x.id === id; });
    if (!c) return;
    perfil = c.perfil || 'feminino';
    document.getElementById('cli-nome').value = c.nome || '';
    document.getElementById('cli-contato').value = c.contato || '';
    document.getElementById('cli-tamanho').value = c.tamanho || '';
    document.getElementById('cli-data').value = c.data_med || '';
    document.getElementById('cli-obs').value = c.obs || '';
    document.getElementById('cli-idade').value = c.idade || '';
    var m = c.medidas || {};
    Object.entries(MAPA_MEDIDAS).forEach(function(e) {
      var el = document.getElementById(e[1]);
      if (el && m[e[0]] !== undefined) el.value = m[e[0]];
    });
    calcElastico();
  }
  selPerfil(perfil, document.getElementById('pb-' + perfil));
  document.getElementById('modal-cliente').classList.add('aberto');
}

async function salvarCliente() {
  var nome = document.getElementById('cli-nome').value.trim();
  if (!nome) { alert('Informe o nome da cliente.'); return; }
  var btn = document.getElementById('btn-salvar');
  setLoading(btn, true);
  var cintura = parseFloat(document.getElementById('cli-cintura').value) || 0;
  var tamanho = document.getElementById('cli-tamanho').value;
  var elasticoResult = calcElasticoValor(cintura, tamanho);
  var medidas = {};
  Object.entries(MAPA_MEDIDAS).forEach(function(e) {
    var el = document.getElementById(e[1]);
    if (el && el.value) medidas[e[0]] = el.value;
  });
  var dados = {
    perfil: perfilAtual, nome: nome,
    contato: document.getElementById('cli-contato').value.trim(),
    tamanho: tamanho,
    data_med: document.getElementById('cli-data').value || null,
    obs: document.getElementById('cli-obs').value.trim(),
    idade: document.getElementById('cli-idade').value.trim(),
    medidas: medidas,
    elastico: elasticoResult ? {val: elasticoResult.val, tipo: elasticoResult.tipo} : null
  };
  try {
    if (editId) {
      var {error} = await db.from('clientes').update(dados).eq('id', editId);
      if (error) throw error;
      toast('Cliente atualizada!');
    } else {
      var {error} = await db.from('clientes').insert(dados);
      if (error) throw error;
      toast('Cliente salva!');
    }
    fecharModal();
    await carregarClientes();
  } catch(e) {
    toast('Erro ao salvar: ' + e.message, 'erro');
  }
  setLoading(btn, false);
}

async function removerCliente(id) {
  if (!confirm('Remover esta cliente?')) return;
  try {
    var {error} = await db.from('clientes').delete().eq('id', id);
    if (error) throw error;
    toast('Cliente removida!');
    await carregarClientes();
  } catch(e) {
    toast('Erro: ' + e.message, 'erro');
  }
}

async function carregarClientes() {
  var {data, error} = await db.from('clientes').select('*').order('nome');
  if (error) { toast('Erro ao carregar clientes', 'erro'); return; }
  clientes = data || [];
  renderClientes();
}

const PERFIL_ICON = {feminino:'🌸', masculino:'👔', infantil:'⭐'};
const PERFIL_TAG = {feminino:'tag-feminino', masculino:'tag-masculino', infantil:'tag-infantil'};
const PERFIL_LABEL = {feminino:'Feminino', masculino:'Masculino', infantil:'Infantil'};

function renderClientes() {
  var grid = document.getElementById('clientes-grid');
  var busca = document.getElementById('busca').value.toLowerCase();
  var lista = clientes.filter(function(c) {
    var matchFiltro = filtroAtual === 'todos' || c.perfil === filtroAtual;
    var matchBusca = !busca || c.nome.toLowerCase().includes(busca);
    return matchFiltro && matchBusca;
  });
  if (!lista.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">👗</div><p>' +
      (busca || filtroAtual !== 'todos' ? 'Nenhuma cliente encontrada.' : 'Nenhuma cliente cadastrada.') +
      '</p>' + (!busca && filtroAtual === 'todos' ? '<button class="btn btn-primary" onclick="abrirModal(null)">+ Adicionar primeira cliente</button>' : '') + '</div>';
    return;
  }
  grid.innerHTML = lista.map(function(c) {
    var perfil = c.perfil || 'feminino';
    var meds = Object.entries(c.medidas || {}).filter(function(e) { return e[1]; });
    var elResult = calcElasticoValor(parseFloat((c.medidas||{}).cintura||0), c.tamanho||'');
    return '<div class="card-cliente">' +
      '<div class="cli-header"><span style="font-size:1.1rem">' + (PERFIL_ICON[perfil]||'👗') + '</span>' +
      '<div><div class="cli-nome">' + c.nome + '</div>' +
      '<span class="cli-tag ' + (PERFIL_TAG[perfil]||'') + '">' + (PERFIL_LABEL[perfil]||perfil) + (c.tamanho ? ' · Tam. ' + c.tamanho : '') + (c.idade ? ' · ' + c.idade : '') + '</span></div></div>' +
      (c.contato ? '<div class="cli-contato">📱 ' + c.contato + '</div>' : '') +
      (elResult ? '<div class="' + (elResult.tipo === 'real' ? 'cli-elastico' : 'cli-elastico-est') + '">📐 Elástico: ' + elResult.val + 'cm' + (elResult.tipo === 'estimativa' ? ' (est.)' : '') + '</div>' : '') +
      (meds.length ? '<div class="medidas-grid">' + meds.slice(0,6).map(function(e) {
        return '<div class="med-item"><span class="med-label">' + (MED_LABEL[e[0]]||e[0]) + '</span><span class="med-val">' + e[1] + (e[0]==='peso'?'kg':'cm') + '</span></div>';
      }).join('') + '</div>' : '') +
      (c.data_med ? '<div style="font-size:10px;color:var(--texto-muted);margin-top:6px">Medido em: ' + fmtData(c.data_med) + '</div>' : '') +
      (c.obs ? '<div style="font-size:11px;color:var(--texto-muted);margin-top:5px;font-style:italic">' + c.obs + '</div>' : '') +
      '<div class="cli-acoes">' +
        '<button class="btn btn-secondary btn-sm" onclick="abrirModal(' + c.id + ')">✏ Editar</button>' +
        '<button class="btn btn-danger btn-sm" onclick="removerCliente(' + c.id + ')">Remover</button>' +
      '</div></div>';
  }).join('');
}

selPerfil('feminino', document.getElementById('pb-feminino'));
carregarClientes();
</script>
<script src="/js/offline.js"></script>
<script>atualizarBannerOffline();</script>
</body>
</html>
