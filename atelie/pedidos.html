<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ateliê — Pedidos</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.pedidos-lista{display:flex;flex-direction:column;gap:0.75rem;}
.pedido-card{background:var(--branco);border:1px solid var(--borda);border-radius:8px;overflow:hidden;transition:box-shadow 0.2s;}
.pedido-card:hover{box-shadow:0 4px 16px rgba(44,24,16,0.1);}
.pedido-header{padding:0.85rem 1rem;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--borda);cursor:pointer;}
.pedido-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pedido-info{flex:1;}
.pedido-cliente{font-family:var(--serif);font-size:1.05rem;}
.pedido-modelo{font-size:11px;color:var(--texto-muted);margin-top:1px;}
.pedido-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.pedido-valor{font-size:13px;font-weight:500;color:var(--marrom);}
.pedido-prazo{font-size:11px;color:var(--texto-muted);}
.pedido-body{padding:1rem;display:none;}
.pedido-body.aberto{display:block;}
.ped-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;margin-bottom:1rem;}
.ped-dado{background:var(--creme);border-radius:4px;padding:6px 10px;}
.ped-dado-label{font-size:9px;text-transform:uppercase;letter-spacing:0.06em;color:var(--texto-muted);display:block;margin-bottom:2px;}
.ped-dado-val{font-size:13px;font-weight:500;}
.ped-dado-verde{background:var(--verde-claro);}
.ped-dado-verde .ped-dado-label{color:var(--verde);}
.ped-dado-verde .ped-dado-val{color:var(--verde);}
.ped-dado-rosa{background:var(--rosa-claro);}
.ped-dado-rosa .ped-dado-label{color:var(--rosa);}
.ped-dado-rosa .ped-dado-val{color:var(--rosa);}
.pag-titulo{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--texto-muted);margin-bottom:8px;}
.pag-lista{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.pag-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 10px;background:var(--creme);border-radius:4px;border:1px solid var(--borda);}
.pag-forma{font-weight:500;min-width:80px;}
.pag-data{color:var(--texto-muted);font-size:11px;}
.pag-obs{flex:1;color:var(--texto-muted);font-style:italic;font-size:11px;}
.pag-valor{font-weight:600;color:var(--verde);}
.add-pag{display:grid;grid-template-columns:100px 90px 1fr 90px auto;gap:6px;margin-top:6px;}
.add-pag input,.add-pag select{font-size:12px;padding:6px 8px;border:1px solid var(--borda);border-radius:4px;background:var(--creme);color:var(--texto);font-family:var(--sans);}
.ped-acoes{display:flex;gap:8px;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--borda);flex-wrap:wrap;}
.ped-obs{font-size:12px;color:var(--texto-muted);font-style:italic;padding:8px 10px;background:var(--creme);border-radius:4px;margin-bottom:0.75rem;}
.status-sel{display:flex;gap:6px;flex-wrap:wrap;}
.status-btn{padding:6px 14px;border:1.5px solid var(--borda);border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;background:var(--branco);transition:all 0.15s;}
.status-btn.sel-aberto{border-color:var(--azul);background:var(--azul-claro);color:var(--azul);}
.status-btn.sel-executando{border-color:var(--rosa);background:var(--rosa-claro);color:var(--rosa);}
.status-btn.sel-pronto{border-color:var(--amarelo);background:var(--amarelo-claro);color:var(--amarelo);}
.status-btn.sel-entregue{border-color:var(--verde);background:var(--verde-claro);color:var(--verde);}
.fin-preview{background:var(--azul-claro);border:1px solid #B0CCEA;border-radius:6px;padding:10px 14px;font-size:12px;color:var(--azul);line-height:1.8;margin-top:0.5rem;display:none;}
.fin-linha{display:flex;justify-content:space-between;padding:2px 0;}
.fin-total{font-weight:600;font-size:13px;border-top:1px solid #B0CCEA;margin-top:4px;padding-top:6px;}
.cli-preview,.mod-preview{background:var(--creme);border-radius:6px;padding:10px 14px;font-size:12px;margin-top:6px;display:none;line-height:1.7;}

/* MATERIAIS DE COMPRA */
.compra-secao{background:var(--rosa-claro);border:1px solid #E0B0B8;border-radius:6px;padding:0.85rem;margin-top:0.5rem;}
.compra-secao-titulo{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--rosa);margin-bottom:8px;}
.compra-item{display:grid;grid-template-columns:1fr 80px 80px 28px;gap:6px;align-items:center;margin-bottom:6px;}
.compra-item input,.compra-item select{font-size:12px;padding:5px 8px;}
.compra-item-custo{font-size:11px;color:var(--verde);font-weight:500;margin-bottom:6px;}
.compra-total{font-size:12px;font-weight:600;color:var(--rosa);padding:6px 8px;background:white;border-radius:4px;margin-top:4px;}

/* LISTA DE COMPRAS NO CARD */
.lista-compras{background:var(--rosa-claro);border:1px solid #E0B0B8;border-radius:4px;padding:8px 10px;margin-bottom:8px;}
.lista-compras-titulo{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--rosa);margin-bottom:5px;}
.lista-compra-item{font-size:12px;padding:2px 0;display:flex;justify-content:space-between;}
.lista-compra-nome{color:var(--texto);}
.lista-compra-val{color:var(--verde);font-weight:500;}

.badge-executando{background:var(--rosa-claro);color:var(--rosa);}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">✂️ Ateliê</a>
    <a href="clientes.html" class="nav-link">👗 <span>Clientes</span></a>
    <a href="biblioteca.html" class="nav-link">🧵 <span>Materiais</span></a>
    <a href="estrutura.html" class="nav-link">✂️ <span>Modelos</span></a>
    <a href="pedidos.html" class="nav-link ativo">📦 <span>Pedidos</span></a>
  </div>
</nav>

<div id="banner-offline" style="display:none;background:#C4973A;color:white;padding:8px 1rem;font-size:12px;font-weight:500;align-items:center;justify-content:center;gap:8px;position:sticky;top:52px;z-index:99;">
  📶 <span id="banner-count">Você está offline</span>
</div>

<div class="container">
  <div class="sec-header">
    <h2>Meus <em>Pedidos</em></h2>
    <button class="btn btn-primary" onclick="abrirModal(null)">+ Novo pedido</button>
  </div>

  <div style="display:flex;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center;">
    <div class="filtros-wrap" id="filtros">
      <button class="filtro-btn ativo" onclick="setFiltro('todos',this)">Todos</button>
      <button class="filtro-btn" onclick="setFiltro('aberto',this)">🧵 Aguardando</button>
      <button class="filtro-btn" onclick="setFiltro('executando',this)">✂️ Executando</button>
      <button class="filtro-btn" onclick="setFiltro('pronto',this)">✅ Prontos</button>
      <button class="filtro-btn" onclick="setFiltro('entregue',this)">📦 Entregues</button>
    </div>
    <div class="busca-wrap">
      <input type="text" id="busca" placeholder="🔍 Buscar por cliente ou modelo..." oninput="renderPedidos()"/>
    </div>
  </div>

  <div class="pedidos-lista" id="pedidos-lista">
    <div class="empty"><div class="empty-icon">🧵</div><p>Carregando...</p></div>
  </div>
</div>

<!-- MODAL PEDIDO -->
<div class="modal-overlay" id="modal-pedido">
  <div class="modal">
    <h3 id="modal-titulo">Novo Pedido</h3>
    <div class="form-row">
      <div class="form-group">
        <label class="lbl">Cliente</label>
        <select id="ped-cliente" onchange="onClienteChange()">
          <option value="">Selecione a cliente...</option>
        </select>
        <div class="cli-preview" id="cli-preview"></div>
      </div>
      <div class="form-group">
        <label class="lbl">Modelo <span class="opcional">(opcional)</span></label>
        <select id="ped-modelo" onchange="onModeloChange()">
          <option value="">Selecione o modelo...</option>
        </select>
        <div class="mod-preview" id="mod-preview"></div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="lbl">Data do pedido</label>
        <input type="date" id="ped-data"/>
      </div>
      <div class="form-group">
        <label class="lbl">Prazo de entrega <span class="opcional">(opcional)</span></label>
        <input type="date" id="ped-prazo"/>
      </div>
    </div>

    <!-- STATUS -->
    <div class="form-group">
      <label class="lbl">Status</label>
      <div class="status-sel">
        <button type="button" class="status-btn sel-aberto" onclick="selStatus('aberto',this)" id="st-aberto">🧵 Aguardando</button>
        <button type="button" class="status-btn" onclick="selStatus('executando',this)" id="st-executando">✂️ Executando</button>
        <button type="button" class="status-btn" onclick="selStatus('pronto',this)" id="st-pronto">✅ Pronto</button>
        <button type="button" class="status-btn" onclick="selStatus('entregue',this)" id="st-entregue">📦 Entregue</button>
      </div>
    </div>

    <!-- FINANCEIRO -->
    <div class="secao">
      <div class="secao-titulo">💰 Financeiro</div>
      <div class="form-row">
        <div class="form-group">
          <label class="lbl">Custo do material (R$)</label>
          <input type="number" id="ped-material" min="0" step="0.01" placeholder="0,00" oninput="calcFin()"/>
        </div>
        <div class="form-group">
          <label class="lbl">Mão de obra (R$)</label>
          <input type="number" id="ped-mao-obra" min="0" step="0.01" placeholder="0,00" oninput="calcFin()"/>
        </div>
      </div>

      <!-- MATERIAIS DE COMPRA SOB DEMANDA -->
      <div class="compra-secao">
        <div class="compra-secao-titulo">🛒 Materiais a comprar para este pedido</div>
        <div id="compra-lista"></div>
        <button type="button" onclick="addItemCompra()" style="font-size:11px;padding:5px 12px;border:1px solid var(--rosa);border-radius:4px;background:white;color:var(--rosa);cursor:pointer;margin-top:4px">+ Adicionar item</button>
        <div id="compra-total" class="compra-total" style="display:none"></div>
      </div>

      <div id="fin-preview" class="fin-preview"></div>
    </div>

    <div class="form-group">
      <label class="lbl">Observações <span class="opcional">(opcional)</span></label>
      <textarea id="ped-obs" rows="2" placeholder="Detalhes especiais..."></textarea>
    </div>
    <div class="modal-acoes">
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar" onclick="salvarPedido()">Salvar pedido</button>
    </div>
  </div>
</div>

<!-- MODAL SOBRAS -->
<div class="modal-overlay" id="modal-sobras">
  <div class="modal">
    <h3>📦 Pedido entregue — registrar sobras</h3>
    <p style="font-size:13px;color:var(--texto-muted);margin-bottom:1.25rem">Se sobrou tecido, registre abaixo. As sobras vão automaticamente para a biblioteca.</p>
    <div id="sobras-form-lista"></div>
    <div class="modal-acoes">
      <button class="btn btn-secondary" onclick="confirmarEntrega(false)">Pular — sem sobras</button>
      <button class="btn btn-primary" id="btn-sobras" onclick="confirmarEntrega(true)">✓ Salvar sobras e entregar</button>
    </div>
  </div>
</div>

<script type="module">
import '/js/firebase.js';

const FORMAS = ['Pix','Dinheiro','Cartão crédito','Cartão débito','Outro'];
const TAMANHOS_PADRAO = {
  '2':42,'4':46,'6':50,'8':54,'10':58,'12':62,
  '34':62,'36':66,'38':70,'40':74,'42':78,'44':82,'46':86,'48':90,'50':94,
  'PP':60,'P':66,'M':72,'G':78,'GG':84,'XG':90
};
const ELASTICO_REDUCAO = 12;

function calcElasticoValor(cintura, tamanho) {
  var red = ELASTICO_REDUCAO;
  if (cintura > 0) {
    var el = (cintura * (1 - red/100)).toFixed(1);
    return {val: el, tipo: 'real'};
  }
  if (tamanho && TAMANHOS_PADRAO[tamanho]) {
    var cinPad = TAMANHOS_PADRAO[tamanho];
    var el2 = (cinPad * (1 - red/100)).toFixed(1);
    return {val: el2, tipo: 'estimativa'};
  }
  return null;
}

let pedidos = [];
let clientes = [];
let estruturas = [];
let editId = null;
let statusAtual = 'aberto';
let filtroAtual = 'todos';
let cardsAbertos = {};
let pedidoEntregandoId = null;
let itensCompra = [];

// Espera firebase carregar
async function esperarFirebase() {
  return new Promise(resolve => {
    if (window._firebaseReady && window.db) return resolve();
    const t = setInterval(() => { if (window._firebaseReady && window.db) { clearInterval(t); resolve(); } }, 50);
  });
}

function fecharModal() { document.getElementById('modal-pedido').classList.remove('aberto'); }

// ===== STATUS =====
window.selStatus = function(val, btn) {
  statusAtual = val;
  ['aberto','executando','pronto','entregue'].forEach(function(s) {
    var b = document.getElementById('st-' + s);
    if(b) { b.className = 'status-btn'; if (s === val) b.classList.add('sel-' + s); }
  });
}

// ===== ITENS DE COMPRA =====
window.addItemCompra = function() {
  itensCompra.push({nome:'', quantidade:'', unidade:'metro', valor_unit:''});
  renderItensCompra();
}
window.removerItemCompra = function(i) {
  itensCompra.splice(i, 1);
  renderItensCompra();
  calcFin();
}

function renderItensCompra() {
  var div = document.getElementById('compra-lista');
  if (!itensCompra.length) {
    div.innerHTML = '<div style="font-size:11px;color:var(--texto-muted);padding:4px 0">Nenhum item adicionado. Use para tecidos comprados sob medida por pedido.</div>';
    document.getElementById('compra-total').style.display = 'none';
    return;
  }
  div.innerHTML = itensCompra.map(function(item, i) {
    var custo = (parseFloat(item.quantidade)||0) * (parseFloat(item.valor_unit)||0);
    return '<div class="compra-item">' +
      '<input type="text" value="' + (item.nome||'') + '" placeholder="Ex: Oxford branco, Cetim rosa..." oninput="itensCompra['+i+'].nome=this.value;calcFin()"/>' +
      '<input type="number" value="' + (item.quantidade||'') + '" placeholder="Qtd" min="0" step="0.1" oninput="itensCompra['+i+'].quantidade=this.value;atualizarCustoCompra('+i+')"/>' +
      '<input type="number" value="' + (item.valor_unit||'') + '" placeholder="R$/m" min="0" step="0.01" oninput="itensCompra['+i+'].valor_unit=this.value;atualizarCustoCompra('+i+')"/>' +
      '<button onclick="removerItemCompra('+i+')" style="background:none;border:none;color:var(--texto-muted);cursor:pointer;font-size:16px">×</button>' +
      '</div>' +
      (custo > 0 ? '<div class="compra-item-custo">= R$ ' + custo.toFixed(2).replace('.',',') + '</div>' : '');
  }).join('');
  atualizarTotalCompra();
}

window.atualizarCustoCompra = function(i) {
  atualizarTotalCompra();
  calcFin();
}

function atualizarTotalCompra() {
  var total = itensCompra.reduce(function(s, item) {
    return s + (parseFloat(item.quantidade)||0) * (parseFloat(item.valor_unit)||0);
  }, 0);
  var div = document.getElementById('compra-total');
  if (total > 0) {
    div.textContent = '🛒 Total a comprar: R$ ' + total.toFixed(2).replace('.',',');
    div.style.display = 'block';
  } else {
    div.style.display = 'none';
  }
  return total;
}

// ===== FINANCEIRO =====
window.calcFin = function() {
  var mat = parseFloat(document.getElementById('ped-material').value) || 0;
  var mao = parseFloat(document.getElementById('ped-mao-obra').value) || 0;
  var compraTotal = atualizarTotalCompra();
  var total = mat + mao + compraTotal;
  var prev = document.getElementById('fin-preview');
  if (!mat && !mao && !compraTotal) { prev.style.display = 'none'; return; }
  prev.style.display = 'block';
  prev.innerHTML =
    (mat ? '<div class="fin-linha"><span>Material em estoque</span><span>' + fmt(mat) + '</span></div>' : '') +
    (compraTotal > 0 ? '<div class="fin-linha"><span>🛒 Compras sob demanda</span><span>' + fmt(compraTotal) + '</span></div>' : '') +
    '<div class="fin-linha"><span>Mão de obra</span><span>' + fmt(mao) + '</span></div>' +
    '<div class="fin-linha fin-total"><span>Total do pedido</span><span>' + fmt(total) + '</span></div>';
}

// ===== CLIENTE CHANGE =====
window.onClienteChange = function() {
  var id = document.getElementById('ped-cliente').value;
  var prev = document.getElementById('cli-preview');
  if (!id) { prev.style.display = 'none'; return; }
  var c = clientes.find(function(x) { return x.id === id; });
  if (!c) { prev.style.display = 'none'; return; }
  var html = '<strong>' + c.nome + '</strong>';
  if (c.contato) html += ' · 📱 ' + c.contato;
  var t = c.tamanhos || {};
  var tams = [];
  if (t.camiseta) tams.push('Camiseta: <strong>' + t.camiseta + '</strong>');
  if (t.calca) tams.push('Calça: <strong>' + t.calca + '</strong>');
  if (t.vestido) tams.push('Vestido: <strong>' + t.vestido + '</strong>');
  if (tams.length) html += '<br>👕 ' + tams.join(' · ');
  var meds = Object.entries(c.medidas || {}).filter(function(e) { return e[1]; });
  if (meds.length) {
    var ml = {busto:'Busto',cintura:'Cintura',quadril:'Quadril',comprimento:'Compr.',ombro:'Ombro',manga:'Manga'};
    html += '<br>' + meds.filter(function(e) { return ml[e[0]]; }).map(function(e) {
      return ml[e[0]] + ': <strong>' + e[1] + 'cm</strong>';
    }).join(' · ');
  }
  var cintura = parseFloat((c.medidas||{}).cintura || 0);
  var tamanho = (c.tamanhos||{}).camiseta || c.tamanho || '';
  var elResult = calcElasticoValor(cintura, tamanho);
  if (elResult) {
    var estilo = elResult.tipo === 'real'
      ? 'background:#E3EEF8;color:#2A5F8A;border-radius:4px;padding:3px 8px;font-weight:500;display:inline-block;margin-top:4px'
      : 'background:#FBF3E3;color:#7A5010;border-radius:4px;padding:3px 8px;font-weight:500;display:inline-block;margin-top:4px';
    html += '<br><span style="' + estilo + '">📐 Elástico: ' + elResult.val + 'cm' + (elResult.tipo === 'estimativa' ? ' (estimativa)' : '') + '</span>';
  }
  prev.innerHTML = html;
  prev.style.display = 'block';
}

// ===== MODELO CHANGE =====
window.onModeloChange = function() {
  var id = document.getElementById('ped-modelo').value;
  var prev = document.getElementById('mod-preview');
  if (!id) { prev.style.display = 'none'; return; }
  var e = estruturas.find(function(x) { return x.id === id; });
  if (!e) { prev.style.display = 'none'; return; }
  var mat = e.custo_material || 0;
  prev.innerHTML = '<strong>' + e.nome + '</strong><br>Custo do material: <strong>' + fmt(mat) + '</strong>' +
    (e.tempo ? ' · Tempo est.: ' + e.tempo + 'h' : '');
  prev.style.display = 'block';
  document.getElementById('ped-material').value = mat.toFixed(2);
  calcFin();
}

// ===== FILTRO =====
window.setFiltro = function(val, btn) {
  filtroAtual = val;
  document.querySelectorAll('.filtro-btn').forEach(function(b) { b.classList.remove('ativo'); });
  btn.classList.add('ativo');
  renderPedidos();
}

// ===== ABRIR MODAL =====
window.abrirModal = async function(id) {
  await esperarFirebase();
  editId = id;
  document.getElementById('modal-titulo').textContent = id ? 'Editar Pedido' : 'Novo Pedido';
  itensCompra = [];

  var [rc, re] = await Promise.all([
    db.from('clientes').select('id,nome,contato,tamanho,medidas,tamanhos').order('nome'),
    db.from('estruturas').select('id,nome,custo_material,tempo,tecidos').order('nome')
  ]);
  clientes = rc.data || [];
  estruturas = re.data || [];

  var selCli = document.getElementById('ped-cliente');
  selCli.innerHTML = '<option value="">Selecione a cliente...</option>' +
    clientes.map(function(c) { return '<option value="' + c.id + '">' + c.nome + '</option>'; }).join('');
  var selMod = document.getElementById('ped-modelo');
  selMod.innerHTML = '<option value="">Selecione o modelo...</option>' +
    estruturas.map(function(e) { return '<option value="' + e.id + '">' + e.nome + '</option>'; }).join('');

  document.getElementById('cli-preview').style.display = 'none';
  document.getElementById('mod-preview').style.display = 'none';
  document.getElementById('fin-preview').style.display = 'none';
  document.getElementById('ped-obs').value = '';
  document.getElementById('ped-material').value = '';
  document.getElementById('ped-mao-obra').value = '';
  document.getElementById('ped-data').value = new Date().toISOString().split('T')[0];
  document.getElementById('ped-prazo').value = '';
  statusAtual = 'aberto';

  if (id) {
    var p = pedidos.find(function(x) { return x.id === id; });
    if (p) {
      selCli.value = p.cliente_id || '';
      selMod.value = p.modelo_id || '';
      document.getElementById('ped-data').value = p.data || '';
      document.getElementById('ped-prazo').value = p.prazo || '';
      document.getElementById('ped-material').value = p.material || '';
      document.getElementById('ped-mao-obra').value = p.mao_obra || '';
      document.getElementById('ped-obs').value = p.obs || '';
      statusAtual = p.status || 'aberto';
      itensCompra = JSON.parse(JSON.stringify(p.itens_compra || []));
      onClienteChange(); onModeloChange(); calcFin();
    }
  }

  ['aberto','executando','pronto','entregue'].forEach(function(s) {
    var b = document.getElementById('st-' + s);
    if(b) { b.className = 'status-btn'; if (s === statusAtual) b.classList.add('sel-' + s); }
  });
  renderItensCompra();
  document.getElementById('modal-pedido').classList.add('aberto');
}

// ===== SALVAR =====
window.salvarPedido = async function() {
  var clienteId = document.getElementById('ped-cliente').value;
  if (!clienteId) { alert('Selecione a cliente.'); return; }
  var cliente = clientes.find(function(c) { return c.id === clienteId; });
  var modeloId = document.getElementById('ped-modelo').value;
  var modelo = modeloId ? estruturas.find(function(e) { return e.id === modeloId; }) : null;
  var material = parseFloat(document.getElementById('ped-material').value) || 0;
  var maoObra = parseFloat(document.getElementById('ped-mao-obra').value) || 0;
  var compraTotal = itensCompra.reduce(function(s,i){ return s+(parseFloat(i.quantidade)||0)*(parseFloat(i.valor_unit)||0);},0);
  var btn = document.getElementById('btn-salvar');
  setLoading(btn, true);

  var novoStatus = statusAtual;
  var statusAnterior = null;
  if (editId) {
    var pAnt = pedidos.find(function(x) { return x.id === editId; });
    if (pAnt) statusAnterior = pAnt.status;
  }

  var dados = {
    cliente_id: clienteId,
    cliente_nome: cliente ? cliente.nome : '',
    modelo_id: modeloId || null,
    modelo_nome: modelo ? modelo.nome : '',
    data: document.getElementById('ped-data').value || null,
    prazo: document.getElementById('ped-prazo').value || null,
    status: novoStatus,
    material: material,
    mao_obra: maoObra,
    custo_compras: parseFloat(compraTotal.toFixed(2)),
    itens_compra: itensCompra,
    total: parseFloat((material + maoObra + compraTotal).toFixed(2)),
    obs: document.getElementById('ped-obs').value.trim()
  };

  try {
    if (editId) {
      var p = pedidos.find(function(x) { return x.id === editId; });
      if (p && p.status === 'entregue') {
        dados.material = p.material;
        dados.total = p.total;
      }
      var {error} = await db.from('pedidos').update(dados).eq('id', editId);
      if (error) throw error;

      // Baixa estoque ao mudar para EXECUTANDO
      if (statusAnterior !== 'executando' && novoStatus === 'executando') {
        await baixarEstoque(editId, dados);
      }
      toast('Pedido atualizado!');
    } else {
      dados.pagamentos = [];
      dados.pag_status = 'pendente';
      var {error} = await db.from('pedidos').insert(dados);
      if (error) throw error;
      // Se já criar como executando, baixa estoque
      if (novoStatus === 'executando') {
        var {data: todosP} = await db.from('pedidos').select('*').order('created_at', {ascending:false});
        if (todosP && todosP.length) {
          await baixarEstoque(todosP[0].id, dados);
        }
      }
      toast('Pedido salvo!');
    }
    fecharModal();
    await carregarPedidos();
  } catch(e) {
    toast('Erro: ' + e.message, 'erro');
  }
  setLoading(btn, false);
}

// ===== BAIXAR ESTOQUE (ao mudar para executando) =====
async function baixarEstoque(pedidoId, dadosPedido) {
  var modeloId = dadosPedido.modelo_id;
  if (!modeloId) return;
  var estrutura = estruturas.find(function(e) { return e.id === modeloId; });
  if (!estrutura || !estrutura.tecidos || !estrutura.tecidos.length) return;

  var {data: mats} = await db.from('materiais').select('*');
  var baixados = 0;

  for (var i = 0; i < estrutura.tecidos.length; i++) {
    var tec = estrutura.tecidos[i];
    var metros = parseFloat(tec.metros || tec.quantidade || 0);
    if (!metros) continue;
    var mat = (mats||[]).find(function(b) {
      return b.nome && tec.nome && b.nome.toLowerCase() === tec.nome.toLowerCase();
    });
    if (mat && mat.estoque > 0) {
      var novoEst = Math.max(0, parseFloat(mat.estoque || 0) - metros);
      await db.from('materiais').update({estoque: parseFloat(novoEst.toFixed(2))}).eq('id', mat.id);
      baixados++;
    }
  }
  if (baixados > 0) toast('✂️ Estoque atualizado — ' + baixados + ' material(is) descontado(s)!');
}

// ===== MUDAR STATUS =====
window.mudarStatus = async function(id, status) {
  try {
    var p = pedidos.find(function(x) { return x.id === id; });
    var statusAnterior = p ? p.status : '';

    if (status === 'entregue') {
      pedidoEntregandoId = id;
      abrirModalSobras(id);
      return;
    }

    var {error} = await db.from('pedidos').update({status: status}).eq('id', id);
    if (error) { toast('Erro: ' + error.message, 'erro'); return; }
    if (p) p.status = status;

    // Baixa estoque ao mudar para EXECUTANDO
    if (statusAnterior !== 'executando' && status === 'executando' && p) {
      // Recarrega estruturas se necessário
      if (!estruturas.length) {
        var {data: est} = await db.from('estruturas').select('id,nome,custo_material,tempo,tecidos');
        estruturas = est || [];
      }
      await baixarEstoque(id, p);
    }

    renderPedidos();
  } catch(e) { toast('Erro: ' + e.message, 'erro'); }
}

// ===== SOBRAS =====
function abrirModalSobras(pedidoId) {
  var p = pedidos.find(function(x) { return x.id === pedidoId; });
  if (!p) return;
  var estrutura = p.modelo_id ? estruturas.find(function(e) { return e.id === p.modelo_id; }) : null;
  var tecidos = estrutura ? (estrutura.tecidos || []) : [];
  var div = document.getElementById('sobras-form-lista');
  if (!tecidos.length) {
    div.innerHTML = '<div style="font-size:13px;color:var(--texto-muted);padding:1rem;text-align:center">Nenhum tecido vinculado a este modelo.</div>';
  } else {
    div.innerHTML = tecidos.map(function(t, i) {
      return '<div style="background:var(--creme);border:1px solid var(--borda);border-radius:6px;padding:0.85rem;margin-bottom:0.75rem">' +
        '<div style="font-weight:500;font-size:13px;margin-bottom:8px">🧵 ' + t.nome + '</div>' +
        '<div class="form-row" style="margin-bottom:6px">' +
          '<div class="form-group"><label class="lbl">Largura da sobra (cm)</label><input type="number" id="sob-larg-' + i + '" placeholder="—" min="0" step="0.5"/></div>' +
          '<div class="form-group"><label class="lbl">Comprimento da sobra (cm)</label><input type="number" id="sob-comp-' + i + '" placeholder="—" min="0" step="0.5"/></div>' +
        '</div>' +
        '<div class="form-group"><label class="lbl">Observação</label><input type="text" id="sob-obs-' + i + '" placeholder="Ex: sem defeito, tem vinco..."/></div>' +
      '</div>';
    }).join('') + '<p style="font-size:11px;color:var(--texto-muted);text-align:center">Deixe em branco os tecidos sem sobra.</p>';
  }
  document.getElementById('modal-sobras').classList.add('aberto');
}

window.confirmarEntrega = async function(salvarSobras) {
  var btn = document.getElementById('btn-sobras');
  setLoading(btn, true);
  try {
    var p = pedidos.find(function(x) { return x.id === pedidoEntregandoId; });
    var estrutura = p && p.modelo_id ? estruturas.find(function(e) { return e.id === p.modelo_id; }) : null;
    var tecidos = estrutura ? (estrutura.tecidos || []) : [];
    var {data: mats} = await db.from('materiais').select('*');

    if (salvarSobras) {
      var salvou = 0;
      for (var j = 0; j < tecidos.length; j++) {
        var larg = parseFloat(document.getElementById('sob-larg-' + j) ? document.getElementById('sob-larg-' + j).value : 0) || 0;
        var comp = parseFloat(document.getElementById('sob-comp-' + j) ? document.getElementById('sob-comp-' + j).value : 0) || 0;
        var obs = document.getElementById('sob-obs-' + j) ? document.getElementById('sob-obs-' + j).value.trim() : '';
        if (!larg || !comp) continue;
        var mat2 = (mats||[]).find(function(b) { return b.nome && tecidos[j].nome && b.nome.toLowerCase() === tecidos[j].nome.toLowerCase(); });
        if (mat2) {
          var sobras = [...(mat2.sobras||[]), {
            largura: larg, comprimento: comp,
            origem: 'Pedido: ' + p.cliente_nome + (p.modelo_nome ? ' · ' + p.modelo_nome : ''),
            obs: obs
          }];
          await db.from('materiais').update({sobras: sobras}).eq('id', mat2.id);
          salvou++;
        }
      }
      if (salvou > 0) toast('📐 ' + salvou + ' sobra(s) registrada(s) na biblioteca!');
    }

    await db.from('pedidos').update({status: 'entregue'}).eq('id', pedidoEntregandoId);
    var p2 = pedidos.find(function(x) { return x.id === pedidoEntregandoId; });
    if (p2) p2.status = 'entregue';
    document.getElementById('modal-sobras').classList.remove('aberto');
    renderPedidos();
  } catch(e) {
    toast('Erro: ' + e.message, 'erro');
  }
  setLoading(btn, false);
}

// ===== PAGAMENTOS =====
window.addPagamento = async function(pedId) {
  try {
    var forma = document.getElementById('forma-' + pedId).value;
    var valor = parseFloat(document.getElementById('vpag-' + pedId).value) || 0;
    var obs = document.getElementById('opag-' + pedId).value.trim();
    var data = document.getElementById('dpag-' + pedId).value;
    if (!valor) { alert('Informe o valor.'); return; }
    var p = pedidos.find(function(x) { return x.id === pedId; });
    if (!p) return;
    var pagamentos = [...(p.pagamentos||[]), {id: Date.now(), forma: forma, valor: valor, obs: obs, data: data || new Date().toISOString().split('T')[0]}];
    var pago = pagamentos.reduce(function(s, pg) { return s + pg.valor; }, 0);
    var pagStatus = pago >= p.total && p.total > 0 ? 'pago' : pago > 0 ? 'parcial' : 'pendente';
    await db.from('pedidos').update({pagamentos: pagamentos, pag_status: pagStatus}).eq('id', pedId);
    p.pagamentos = pagamentos; p.pag_status = pagStatus;
    cardsAbertos[pedId] = true;
    renderPedidos();
  } catch(e) { toast('Erro: ' + e.message, 'erro'); }
}

window.removerPagamento = async function(pedId, pagId) {
  try {
    var p = pedidos.find(function(x) { return x.id === pedId; });
    if (!p) return;
    var pagamentos = (p.pagamentos||[]).filter(function(pg) { return pg.id !== pagId; });
    var pago = pagamentos.reduce(function(s, pg) { return s + pg.valor; }, 0);
    var pagStatus = pago >= p.total && p.total > 0 ? 'pago' : pago > 0 ? 'parcial' : 'pendente';
    await db.from('pedidos').update({pagamentos: pagamentos, pag_status: pagStatus}).eq('id', pedId);
    p.pagamentos = pagamentos; p.pag_status = pagStatus;
    cardsAbertos[pedId] = true;
    renderPedidos();
  } catch(e) { toast('Erro: ' + e.message, 'erro'); }
}

window.toggleCard = function(id) {
  cardsAbertos[id] = !cardsAbertos[id];
  renderPedidos();
}

window.removerPedido = async function(id) {
  try {
    if (!confirm('Remover este pedido?')) return;
    await db.from('pedidos').delete().eq('id', id);
    pedidos = pedidos.filter(function(x) { return x.id !== id; });
    toast('Pedido removido!');
    renderPedidos();
  } catch(e) { toast('Erro: ' + e.message, 'erro'); }
}

async function carregarPedidos() {
  await esperarFirebase();
  var {data, error} = await db.from('pedidos').select('*').order('created_at', {ascending: false});
  if (error) { toast('Erro ao carregar pedidos', 'erro'); return; }
  pedidos = data || [];
  var {data: est} = await db.from('estruturas').select('id,nome,custo_material,tempo,tecidos');
  estruturas = est || [];
  renderPedidos();
}

const statusCor = {aberto:'var(--azul)', executando:'var(--rosa)', pronto:'var(--amarelo)', entregue:'var(--verde)'};
const statusLabel = {aberto:'Aguardando', executando:'Executando', pronto:'Pronto', entregue:'Entregue'};
const pagLabel = {pago:'Pago', parcial:'Parcial', pendente:'Pendente'};

function renderPedidos() {
  var div = document.getElementById('pedidos-lista');
  var busca = document.getElementById('busca').value.toLowerCase();
  var lista = pedidos.filter(function(p) {
    var matchFiltro = filtroAtual === 'todos' || p.status === filtroAtual;
    var matchBusca = !busca || (p.cliente_nome||'').toLowerCase().includes(busca) || (p.modelo_nome||'').toLowerCase().includes(busca);
    return matchFiltro && matchBusca;
  });
  lista.sort(function(a, b) {
    var ord = {aberto:0, executando:1, pronto:2, entregue:3};
    if (ord[a.status] !== ord[b.status]) return ord[a.status] - ord[b.status];
    return (b.data||'') > (a.data||'') ? 1 : -1;
  });
  if (!lista.length) {
    div.innerHTML = '<div class="empty"><div class="empty-icon">🧵</div><p>' +
      (busca || filtroAtual !== 'todos' ? 'Nenhum pedido encontrado.' : 'Nenhum pedido cadastrado.') +
      '</p>' + (!busca && filtroAtual === 'todos' ? '<button class="btn btn-primary" onclick="abrirModal(null)">+ Criar primeiro pedido</button>' : '') + '</div>';
    return;
  }
  div.innerHTML = lista.map(function(p) {
    var pago = (p.pagamentos||[]).reduce(function(s, pg) { return s + pg.valor; }, 0);
    var saldo = parseFloat(((p.total||0) - pago).toFixed(2));
    var pagSt = p.pag_status || (pago >= p.total && p.total > 0 ? 'pago' : pago > 0 ? 'parcial' : 'pendente');
    var aberto = cardsAbertos[p.id];
    var itensC = p.itens_compra || [];

    return '<div class="pedido-card">' +
      '<div class="pedido-header" onclick="toggleCard(\'' + p.id + '\')">' +
        '<div class="pedido-status-dot" style="background:' + (statusCor[p.status]||'gray') + '"></div>' +
        '<div class="pedido-info">' +
          '<div class="pedido-cliente">' + (p.cliente_nome||'—') + '</div>' +
          '<div class="pedido-modelo">' + (p.modelo_nome||'Sem modelo vinculado') + (p.data ? ' · ' + fmtData(p.data) : '') + '</div>' +
        '</div>' +
        '<div class="pedido-badges">' +
          '<span class="badge badge-' + p.status + '">' + (statusLabel[p.status]||p.status) + '</span>' +
          (p.total > 0 ? '<span class="badge badge-' + pagSt + '">' + (pagLabel[pagSt]||pagSt) + '</span>' : '') +
        '</div>' +
        (p.total > 0 ? '<div style="text-align:right"><div class="pedido-valor">' + fmt(p.total) + '</div>' + (p.prazo ? '<div class="pedido-prazo">Entrega: ' + fmtData(p.prazo) + '</div>' : '') + '</div>' : '') +
      '</div>' +
      '<div class="pedido-body' + (aberto ? ' aberto' : '') + '">' +
        // Lista de compras
        (itensC.length ? '<div class="lista-compras"><div class="lista-compras-titulo">🛒 Materiais a comprar</div>' +
          itensC.map(function(item) {
            var custo = (parseFloat(item.quantidade)||0)*(parseFloat(item.valor_unit)||0);
            return '<div class="lista-compra-item">' +
              '<span class="lista-compra-nome">' + (item.nome||'—') + ' × ' + (item.quantidade||0) + ' (' + (item.unidade||'m') + ')</span>' +
              (custo > 0 ? '<span class="lista-compra-val">R$ ' + custo.toFixed(2).replace('.',',') + '</span>' : '') +
              '</div>';
          }).join('') +
          (p.custo_compras > 0 ? '<div style="font-size:11px;font-weight:600;color:var(--rosa);padding-top:4px;border-top:1px solid #E0B0B8;margin-top:4px">Total: R$ ' + parseFloat(p.custo_compras).toFixed(2).replace('.',',') + '</div>' : '') +
        '</div>' : '') +
        (p.total > 0 ? '<div class="ped-grid">' +
          '<div class="ped-dado"><span class="ped-dado-label">Material estoque</span><span class="ped-dado-val">' + fmt(p.material) + '</span></div>' +
          (p.custo_compras > 0 ? '<div class="ped-dado"><span class="ped-dado-label">🛒 Compras</span><span class="ped-dado-val">' + fmt(p.custo_compras) + '</span></div>' : '') +
          '<div class="ped-dado"><span class="ped-dado-label">Mão de obra</span><span class="ped-dado-val">' + fmt(p.mao_obra) + '</span></div>' +
          '<div class="ped-dado ped-dado-verde"><span class="ped-dado-label">Total</span><span class="ped-dado-val">' + fmt(p.total) + '</span></div>' +
          '<div class="ped-dado ped-dado-verde"><span class="ped-dado-label">Pago</span><span class="ped-dado-val">' + fmt(pago) + '</span></div>' +
          (saldo > 0 ? '<div class="ped-dado ped-dado-rosa"><span class="ped-dado-label">Saldo restante</span><span class="ped-dado-val">' + fmt(saldo) + '</span></div>' : '') +
        '</div>' : '') +
        (p.obs ? '<div class="ped-obs">📝 ' + p.obs + '</div>' : '') +
        '<div class="pag-titulo">💳 Pagamentos recebidos</div>' +
        '<div class="pag-lista">' +
          (!(p.pagamentos||[]).length ? '<div style="font-size:12px;color:var(--texto-muted);padding:4px 0">Nenhum pagamento registrado.</div>' :
            (p.pagamentos||[]).map(function(pg) {
              return '<div class="pag-item">' +
                '<span class="pag-forma">' + pg.forma + '</span>' +
                '<span class="pag-data">' + fmtData(pg.data) + '</span>' +
                '<span class="pag-obs">' + (pg.obs||'') + '</span>' +
                '<span class="pag-valor">+ ' + fmt(pg.valor) + '</span>' +
                (p.status !== 'entregue' ? '<button onclick="removerPagamento(\'' + p.id + '\',' + pg.id + ')" style="background:none;border:none;color:var(--texto-muted);cursor:pointer;font-size:14px;padding:0 2px">×</button>' : '') +
              '</div>';
            }).join('')
          ) +
        '</div>' +
        (p.status !== 'entregue' ? '<div class="add-pag">' +
          '<select id="forma-' + p.id + '">' + FORMAS.map(function(f) { return '<option>' + f + '</option>'; }).join('') + '</select>' +
          '<input type="date" id="dpag-' + p.id + '" value="' + new Date().toISOString().split('T')[0] + '"/>' +
          '<input type="text" id="opag-' + p.id + '" placeholder="Observação (opcional)"/>' +
          '<input type="number" id="vpag-' + p.id + '" placeholder="R$ valor" min="0" step="0.01"/>' +
          '<button class="btn btn-verde btn-sm" onclick="addPagamento(\'' + p.id + '\')">+ Registrar</button>' +
        '</div>' : '') +
        '<div class="ped-acoes">' +
          (p.status !== 'entregue' ? '<button class="btn btn-secondary btn-sm" onclick="abrirModal(\'' + p.id + '\')">✏ Editar</button>' : '') +
          (p.status === 'aberto' ? '<button class="btn btn-sm" style="background:var(--rosa-claro);color:var(--rosa);border:1px solid var(--rosa)" onclick="mudarStatus(\'' + p.id + '\',\'executando\')">✂️ Iniciar execução</button>' : '') +
          (p.status === 'executando' ? '<button class="btn btn-sm" style="background:var(--amarelo-claro);color:var(--amarelo);border:1px solid var(--amarelo)" onclick="mudarStatus(\'' + p.id + '\',\'pronto\')">✅ Marcar pronto</button>' : '') +
          (p.status === 'pronto' ? '<button class="btn btn-verde btn-sm" onclick="mudarStatus(\'' + p.id + '\',\'entregue\')">📦 Marcar entregue</button>' : '') +
          '<button class="btn btn-danger btn-sm" onclick="removerPedido(\'' + p.id + '\')">Remover</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

carregarPedidos();
</script>
